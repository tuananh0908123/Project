name: CI/CD Pipeline Standard (Manual Run)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # --- BACKEND BUILD ---
      - name: Build Backend JAR
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # --- FRONTEND BUILD ---
      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # --- LƯU TRỮ ARTIFACTS ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/target/*.jar
            frontend/build/

  deploy-staging:
    needs: build-and-test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SCP to Staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST_IP }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: "backend/target/*.jar,frontend/build/*"
          target: "/tmp/staging_deploy"
          strip_components: 1

      - name: Deploy Staging (Manual Run)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST_IP }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            echo ">>> Triển khai STAGING cổng 8081..."
            # 1. Tắt bản cũ đang chạy ở cổng 8081
            sudo fuser -k 8081/tcp || true

            # 2. Cập nhật file JAR
            sudo mkdir -p /opt/staging/backend
            sudo find /tmp/staging_deploy -name "*.jar" -exec cp {} /opt/staging/backend/app.jar \;

            # 3. Cập nhật Frontend Staging
            sudo mkdir -p /var/www/staging
            sudo rm -rf /var/www/staging/*
            sudo cp -r /tmp/staging_deploy/build/* /var/www/staging/

            # 4. CHẠY THỦ CÔNG DÙNG NOHUP (Cổng 8081)
            cd /opt/staging/backend
            sudo nohup java -jar app.jar --server.port=8081 > staging.log 2>&1 &

            # 5. Kiểm tra và dọn dẹp
            sleep 5
            ps aux | grep "8081" | grep -v grep
            sudo rm -rf /tmp/staging_deploy
            echo ">>> Staging deploy thành công!"

  deploy-production:
    needs: build-and-test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SCP to Production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST_IP }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "backend/target/*.jar,frontend/build/*"
          target: "/tmp/prod_deploy"
          strip_components: 1

      - name: Deploy Production (Manual Run)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST_IP }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            echo ">>> Triển khai PRODUCTION cổng 8080..."
            # 1. Tắt bản cũ đang chạy ở cổng 8080
            sudo fuser -k 8080/tcp || true

            # 2. Cập nhật file JAR
            sudo mkdir -p /opt/backend
            sudo find /tmp/prod_deploy -name "*.jar" -exec cp {} /opt/backend/app.jar \;

            # 3. Cập nhật Frontend Production
            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/prod_deploy/build/* /var/www/html/

            # 4. CHẠY THỦ CÔNG DÙNG NOHUP (Cổng 8080)
            cd /opt/backend
            sudo nohup java -jar app.jar --server.port=8080 > prod.log 2>&1 &

            # 5. Kiểm tra và dọn dẹp
            sleep 5
            ps aux | grep "8080" | grep -v grep
            sudo rm -rf /tmp/prod_deploy
            echo ">>> Production deploy thành công!"