name: CI/CD Pipeline Standard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # --- BACKEND BUILD ---
      - name: Build Backend JAR
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # --- FRONTEND BUILD ---
      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          # npm test -- --coverage --watchAll=false  # Mở ra nếu anh đã fix xong App.test.js
          npm run build

      # --- LƯU TRỮ ARTIFACTS ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/target/*.jar
            frontend/build/

  deploy-staging:
    needs: build-and-test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SCP Transfer to Staging
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.STAGING_HOST_IP }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: "backend/target/*.jar,frontend/build/*"
          target: "/tmp/staging_deploy"
          strip_components: 1

      - name: Execute Deploy on Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST_IP }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            echo ">>> Đang dọn dẹp và chuẩn bị môi trường..."
            sudo systemctl stop backend-staging || true
            
            # 1. Đảm bảo thư mục đích tồn tại và sạch sẽ
            sudo mkdir -p /opt/staging/backend
            sudo rm -f /opt/staging/backend/app.jar
            
            # 2. TÌM file jar trong folder tạm (bất kể nó nằm sâu thế nào) và copy ra đổi tên
            # Lệnh này sẽ tìm file .jar trong /tmp/staging_deploy và đưa về /opt/staging/backend/app.jar
            sudo find /tmp/staging_deploy -name "*.jar" -exec cp {} /opt/staging/backend/app.jar \;
            
            # 3. Phân quyền cho user chạy được file
            sudo chown -R $USER:$USER /opt/staging/backend
            sudo chmod +x /opt/staging/backend/app.jar
            
            # 4. Khởi động lại dịch vụ
            echo ">>> Đang khởi động Backend..."
            sudo systemctl daemon-reload
            sudo systemctl start backend-staging
            
            # 5. Kiểm tra nhanh xem file đã xuất hiện chưa
            ls -lh /opt/staging/backend/app.jar
  deploy-production:
    needs: build-and-test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SCP Transfer to Production
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST_IP }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "backend/target/*.jar,frontend/build/*"
          target: "/tmp/prod_deploy"
          strip_components: 1

      - name: Execute Deploy on Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST_IP }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            echo ">>> Deploying to PRODUCTION..."
            sudo mkdir -p /opt/backend
            sudo cp /opt/backend/app.jar /opt/backend/app.jar.bak || true

            sudo systemctl stop backend || true
            sudo cp /tmp/prod_deploy/target/*.jar /opt/backend/app.jar
            sudo systemctl start backend

            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/prod_deploy/build/* /var/www/html/

            rm -rf /tmp/prod_deploy
            echo "Production deployment successful!"