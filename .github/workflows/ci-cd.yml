name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Test & build frontend
        run: |
          cd frontend
          npm ci
          npm test -- --watchAll=false   # bỏ comment khi fix xong App.test.js
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/target/*.jar
            frontend/build/

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest        # đổi từ self-hosted
    if: github.ref == 'refs/heads/develop'
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SCP to staging
        uses: appleboy/scp-action@v0.1.7   # pin version cụ thể
        with:
          host: ${{ secrets.STAGING_HOST_IP }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: "backend/target/*.jar,frontend/build"
          target: "/tmp/staging_deploy"
          strip_components: 1

      - name: Deploy staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST_IP }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            # Backup JAR cũ
            [ -f /opt/staging/backend/app.jar ] && \
              cp /opt/staging/backend/app.jar /opt/staging/backend/app.jar.bak

            sudo systemctl stop backend-staging || true

            # Deploy backend
            sudo mkdir -p /opt/staging/backend
            sudo find /tmp/staging_deploy -name "*.jar" \
              -exec cp {} /opt/staging/backend/app.jar \;

            # Deploy frontend (thêm mới)
            sudo mkdir -p /var/www/staging
            sudo rm -rf /var/www/staging/*
            sudo cp -r /tmp/staging_deploy/build/* /var/www/staging/

            sudo systemctl start backend-staging

            # Health check thực sự
            sleep 15
            curl -f http://localhost:8082/api/health || {
              echo "Health check failed, rolling back..."
              cp /opt/staging/backend/app.jar.bak /opt/staging/backend/app.jar
              sudo systemctl restart backend-staging
              exit 1
            }

            # Dọn dẹp (thêm mới)
            sudo rm -rf /tmp/staging_deploy
            echo "Staging deploy successful!"

  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SCP to production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST_IP }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "backend/target/*.jar,frontend/build"
          target: "/tmp/prod_deploy"
          strip_components: 1

      - name: Deploy production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST_IP }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            # Backup JAR cũ
            [ -f /opt/backend/app.jar ] && \
              cp /opt/backend/app.jar /opt/backend/app.jar.bak

            sudo systemctl stop backend || true

            sudo mkdir -p /opt/backend
            sudo find /tmp/prod_deploy -name "*.jar" \
              -exec cp {} /opt/backend/app.jar \;

            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/prod_deploy/build/* /var/www/html/

            sudo systemctl restart backend

            # Health check thực sự
            sleep 15
            curl -f http://localhost:8080/api/health || {
              echo "Health check failed, rolling back..."
              cp /opt/backend/app.jar.bak /opt/backend/app.jar
              sudo systemctl restart backend
              exit 1
            }

            sudo rm -rf /tmp/prod_deploy
            echo "Production deploy successful!"