name: CI/CD Pipeline

# 1. Định nghĩa sự kiện kích hoạt (Trigger)
on:
  push:
    branches: [ "main" ] # Sẽ tự chạy khi anh push code lên nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy code từ GitHub về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Java JDK 17 để build Backend
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Bước 3: Chạy Maven để tạo file .jar (tạo ra thư mục target)
    - name: Build Backend with Maven
      run: |
        cd backend
        mvn clean package -DskipTests

    # Bước 4: Đăng nhập vào Docker Hub bằng Secret đã cài ở Settings
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Bước 5: Build Docker Image cho Backend và đẩy lên Hub
    - name: Build and push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        # THAY 'tuananh0908123' thành username Docker Hub của anh nếu khác
        tags: tuananh0908/backend:latest 

    # Bước 6: Build Docker Image cho Frontend và đẩy lên Hub
    - name: Build and push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        # THAY 'tuananh0908123' thành username Docker Hub của anh nếu khác
        tags: tuananh0908/frontend:latest