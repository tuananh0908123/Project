name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # --- PHẦN BUILD RA FILE TRƯỚC (Artifacts) ---
    - name: Set up JDK & Build Backend
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
      run: |
        cd backend
        mvn clean package -DskipTests

    - name: Set up Node & Build Frontend
      uses: actions/setup-node@v3
      with:
        node-version: '18'
      run: |
        cd frontend
        npm install
        CI=false npm run build

    # --- PHẦN DOCKER BUILD (HIỆN RÕ LỆNH ĐÂY ANH) ---
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker Build and Push Backend
      run: |
        # Lệnh build thủ công anh hay gõ đây
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./backend
        # Lệnh đẩy lên kho
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

    - name: Docker Build and Push Frontend
      run: |
        # Lệnh build thủ công cho frontend
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./frontend
        # Lệnh đẩy lên kho
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest