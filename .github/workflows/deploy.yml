name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Tự động chạy khi anh push code vào nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 1. Tự động Build và Push Backend
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: <username_cua_anh>/backend:latest

    # 2. Tự động Build và Push Frontend
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: <username_cua_anh>/frontend:latest

    # 3. Ra lệnh cho K8s cập nhật (Nếu anh dùng K8s trên Cloud)
    # Lưu ý: Nếu chạy K8s dưới máy (Local), bước này chỉ cập nhật file YAML trên GitHub.
    # Anh vẫn cần gõ 'kubectl apply -f k8s/' dưới máy để kéo hàng mới về.
    - name: Update K8s manifests
      run: |
        kubectl patch deployment spring-backend -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"build_time\":\"$(date)\"}}}}}"
        kubectl patch deployment react-frontend -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"build_time\":\"$(date)\"}}}}}"